apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-app
        image: dealanregistry.azurecr.io/dealan-order-service:latest
        imagePullPolicy: Always
        env:
        - name: PORT
          value: "3004"
        envFrom:
        - configMapRef:
            name: dealan-config
        ports:
        - containerPort: 3004
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  selector:
    app: order-service
  ports:
    - protocol: TCP
      port: 8089
      targetPort: 3004
  type: ClusterIP

