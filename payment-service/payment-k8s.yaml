apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-deployment
  labels:
    app: payment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
    spec:
      containers:
      - name: payment-container
        image: dealanregistry.azurecr.io/dealan-payment-service:latest
        imagePullPolicy: Always
        env:
        - name: PORT
          value: "3010"
        envFrom:
        - configMapRef:
            name: dealan-config
        ports:
        - containerPort: 3010
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
spec:
  selector:
    app: payment
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3010
  type: ClusterIP

