apiVersion: apps/v1
kind: Deployment

metadata:
  name: chat-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: chat-service

  template:
    metadata:
      labels:
        app: chat-service

    spec:
      containers:
      - name: chat-service

        image: dealanregistry.azurecr.io/dealan-chat-service:latest

        env:
        - name: PORT
          value: "3015"
        envFrom:
        - configMapRef:
            name: dealan-config
        ports:
        - containerPort: 3015

---
apiVersion: v1
kind: Service

metadata:
  name: chat-service

spec:
  selector:
    app: chat-service

  ports:
    - protocol: TCP
      port: 8087
      targetPort: 3015

  type: NodePort

