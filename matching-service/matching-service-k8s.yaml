apiVersion: apps/v1
kind: Deployment
metadata:
  name: matching-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: matching-service
  template:
    metadata:
      labels:
        app: matching-service
    spec:
      containers:
      - name: matching-app
        image: dealanregistry.azurecr.io/dealan-matching-service:latest
        imagePullPolicy: Always
        env:
        - name: PORT
          value: "3005"
        envFrom:
        - configMapRef:
            name: dealan-config
        ports:
        - containerPort: 3005
---
apiVersion: v1
kind: Service
metadata:
  name: matching-service
spec:
  selector:
    app: matching-service
  ports:
    - protocol: TCP
      port: 8091
      targetPort: 3005
  type: ClusterIP

