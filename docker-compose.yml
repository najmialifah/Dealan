version: '3.8'

services:
  # ------------------------------------
  # 1. Database (PostgreSQL + PostGIS)
  # ------------------------------------
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: dealan_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dealan
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - dealan_net

  # ------------------------------------
  # 2. Cache (Redis)
  # ------------------------------------
  redis:
    image: redis:7-alpine
    container_name: dealan_redis
    ports:
      - "6379:6379"
    networks:
      - dealan_net

  # ------------------------------------
  # 3. Message Broker (Zookeeper + Kafka)
  # ------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: dealan_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - dealan_net

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: dealan_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - dealan_net

  # ------------------------------------
  # 4. API Gateway (Kong DB-less)
  # ------------------------------------
  kong:
    image: kong:3.4-ubuntu
    container_name: dealan_kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
      - "8444:8444"
    volumes:
      - ./api-gateway/kong.yml:/usr/local/kong/declarative/kong.yml
    networks:
      - dealan_net

  # ------------------------------------
  # 5. Microservices
  # ------------------------------------
  auth-service:
    build: ./auth-service
    image: dealan-auth-service:latest
    container_name: dealan_auth_service
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=dealan
      - DB_PORT=5432
      - PORT=3001
      - KAFKA_BROKER=kafka:29092
      - KAFKA_BROKERS=kafka:29092
      - DB_URL=host=postgres user=postgres password=password dbname=dealan port=5432 sslmode=disable
      - DATABASE_URL=host=postgres user=postgres password=password dbname=dealan port=5432 sslmode=disable
    depends_on:
      - postgres
      - kafka
    networks:
      - dealan_net

  user-service:
    build: ./user-service
    image: dealan-user-service:latest
    container_name: dealan_user_service
    ports:
      - "3002:3002"
    environment:
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=dealan
      - DB_PORT=5432
