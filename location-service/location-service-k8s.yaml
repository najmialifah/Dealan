apiVersion: apps/v1
kind: Deployment
metadata:
  name: location-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: location-service
  template:
    metadata:
      labels:
        app: location-service
    spec:
      containers:
      - name: location-app
        image: dealanregistry.azurecr.io/dealan-location-service:latest
        imagePullPolicy: Always
        env:
        - name: PORT
          value: "3008"
        envFrom:
        - configMapRef:
            name: dealan-config
        ports:
        - containerPort: 3008
---
apiVersion: v1
kind: Service
metadata:
  name: location-service
spec:
  selector:
    app: location-service
  ports:
    - protocol: TCP
      port: 8090
      targetPort: 3008
  type: ClusterIP

