apiVersion: apps/v1
kind: Deployment
metadata:
  name: punishment-service-deployment
  labels:
    app: punishment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: punishment-service
  template:
    metadata:
      labels:
        app: punishment-service
    spec:
      containers:
      - name: punishment-service
        image: dealanregistry.azurecr.io/dealan-punishment-service:latest
        env:
        - name: PORT
          value: "3013"
        envFrom:
        - configMapRef:
            name: dealan-config
        ports:
        - containerPort: 3013
---
apiVersion: v1
kind: Service
metadata:
  name: punishment-service
spec:
  selector:
    app: punishment-service
  ports:
    - protocol: TCP
      port: 8086
      targetPort: 3013
  type: ClusterIP


