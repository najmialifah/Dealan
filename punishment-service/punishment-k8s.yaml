apiVersion: apps/v1
kind: Deployment
metadata:
  name: punishment-service-deployment
  labels:
    app: punishment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: punishment-service
  template:
    metadata:
      labels:
        app: punishment-service
    spec:
      containers:
      - name: punishment-service
        image: kelompokdealan/punishment-service:latest
        ports:
        - containerPort: 8086
---
apiVersion: v1
kind: Service
metadata:
  name: punishment-service
spec:
  selector:
    app: punishment-service
  ports:
    - protocol: TCP
      port: 8086
      targetPort: 8086
  type: ClusterIP
