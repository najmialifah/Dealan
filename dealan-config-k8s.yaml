apiVersion: v1
kind: ConfigMap
metadata:
  name: dealan-config
data:
  DB_HOST: "postgres-svc"
  DB_USER: "postgres"
  DB_PASSWORD: "password"
  DB_NAME: "dealan"
  DB_PORT: "5432"
  KAFKA_BROKER: "kafka-svc:9092"
  KAFKA_BROKERS: "kafka-svc:9092"
  DB_URL: "host=postgres-svc user=postgres password=password dbname=dealan port=5432 sslmode=disable"
  DATABASE_URL: "host=postgres-svc user=postgres password=password dbname=dealan port=5432 sslmode=disable"
  REDIS_URL: "redis://redis-svc:6379"
  REDIS_HOST: "redis-svc"
  REDIS_PORT: "6379"
