apiVersion: apps/v1
kind: Deployment
metadata:
  name: pricing-deployment
  labels:
    app: pricing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pricing
  template:
    metadata:
      labels:
        app: pricing
    spec:
      containers:
      - name: pricing-container
        image: dealanregistry.azurecr.io/dealan-pricing-service:latest
        imagePullPolicy: Always
        env:
        - name: PORT
          value: "3006"
        envFrom:
        - configMapRef:
            name: dealan-config
        ports:
        - containerPort: 3006
---
apiVersion: v1
kind: Service
metadata:
  name: pricing-service
spec:
  selector:
    app: pricing
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3006
  type: ClusterIP

