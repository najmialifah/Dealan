apiVersion: apps/v1
kind: Deployment
metadata:
  name: pricing-deployment
  labels:
    app: pricing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pricing
  template:
    metadata:
      labels:
        app: pricing
    spec:
      containers:
      - name: pricing-container
        image: kelompokdealan/pricing-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8092
---
apiVersion: v1
kind: Service
metadata:
  name: pricing-service
spec:
  selector:
    app: pricing
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8092
  type: ClusterIP