apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-deployment
  labels:
    app: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
      - name: auth-container
        image: dealanregistry.azurecr.io/dealan-auth-service:latest # <-- Menembak ke Docker Hub bersama
        imagePullPolicy: Always # Memaksa K8s selalu mendownload versi terbaru
        env:
        - name: PORT
          value: "3001"
        envFrom:
        - configMapRef:
            name: dealan-config
        ports:
        - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service-svc # <-- Nama DNS internal untuk dipanggil service lain
spec:
  type: ClusterIP # Cukup ClusterIP karena nanti gerbang luar menggunakan Ingress
  selector:
    app: auth
  ports:
  - protocol: TCP
    port: 8081
    targetPort: 3001

