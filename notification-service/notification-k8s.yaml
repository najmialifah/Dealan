apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service-deployment
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: dealanregistry.azurecr.io/dealan-notification-service:latest
        env:
        - name: PORT
          value: "3011"
        envFrom:
        - configMapRef:
            name: dealan-config
        ports:
        - containerPort: 3011
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - protocol: TCP
      port: 8084
      targetPort: 3011
  type: ClusterIP


