apiVersion: apps/v1
kind: Deployment
metadata:
  name: map-route-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: map-route-service
  template:
    metadata:
      labels:
        app: map-route-service
    spec:
      containers:
        - name: map-route-service
          image: dealanregistry.azurecr.io/dealan-map-route-service:latest
          imagePullPolicy: Always
          env:
          - name: PORT
            value: "3009"
          envFrom:
          - configMapRef:
              name: dealan-config
          ports:
            - containerPort: 3009

---
apiVersion: v1
kind: Service
metadata:
  name: map-route-service
spec:
  selector:
    app: map-route-service
  ports:
    - protocol: TCP
      port: 8088
      targetPort: 3009
  type: NodePort

